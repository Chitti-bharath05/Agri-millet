name: agrimillet
description: AgriMillet - Millet Marketplace App for Farmers and Buyers in India

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.0
  shared_preferences: ^2.1.0
  intl: ^0.18.1
  image_picker: ^0.8.7+4
  google_maps_flutter: ^2.4.0
  geolocator: ^9.0.2
  razorpay_flutter: ^1.3.3
  flutter_tts: 4.2.5
  connectivity_plus: ^4.0.1
  loading_indicator: ^3.1.0
  cached_network_image: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
    - assets/icons/
